# Chạy không cần PostgreSQL/Docker:
# mvn spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=local
spring:
  datasource:
    url: jdbc:h2:mem:lms;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
