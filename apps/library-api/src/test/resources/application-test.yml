spring:
  datasource:
    url: jdbc:h2:mem:lms-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

library:
  max-loan-count: 5
  loan-days-default: 14
  max-renewals: 2
  fine-per-day: 5000
  reminder-days-before: 2
  jwt:
    secret: test-secret-key-at-least-32-characters-long
    expiration-hours: 8
